<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Primary Meta Tags -->
		<title>Pockethost — Zip it. Upload it. It's live.</title>
		<meta name="title" content="Pockethost — Zip it. Upload it. It's live." />
		<meta name="description" content="The simplest hosting platform on the internet. Upload a zip and your static site, Discord bot, or Python app is live in seconds. No build step, no git, no Docker." />
		<meta name="keywords" content="hosting, static sites, discord bots, python apps, simple hosting, zip upload, instant deploy" />
		<meta name="author" content="Pockethost" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://pockethost.dev" />
		
		<!-- Favicons -->
		<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicons/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicons/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/favicons/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/favicons/site.webmanifest" />
		<meta name="theme-color" content="#2563eb" />
		<meta name="msapplication-TileColor" content="#2563eb" />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://pockethost.dev" />
		<meta property="og:title" content="Pockethost — Zip it. Upload it. It's live." />
		<meta property="og:description" content="The simplest hosting platform on the internet. Upload a zip and your static site, Discord bot, or Python app is live in seconds. No build step, no git, no Docker." />
		<meta property="og:image" content="https://pockethost.dev/main-og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="Pockethost" />
		
		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://pockethost.dev" />
		<meta name="twitter:title" content="Pockethost — Zip it. Upload it. It's live." />
		<meta name="twitter:description" content="The simplest hosting platform on the internet. Upload a zip and your static site, Discord bot, or Python app is live in seconds." />
		<meta name="twitter:image" content="https://pockethost.dev/main-og-image.png" />
		<meta name="twitter:site" content="@pockethost" />
		
		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
